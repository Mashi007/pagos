[pytest]
# Pytest configuration for pagos and prestamos tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Test markers for organizing tests
markers =
    smoke: smoke tests that must pass before deploy
    integration: integration tests against real database
    unit: unit tests
    pagos: pagos service tests
    prestamos: prestamos service tests
    slow: slow running tests
    db: database-related tests
    amortization: amortization calculations tests
    payment: payment recording tests
    state_transition: state transition tests

# Coverage options
[coverage:run]
source = app
omit =
    */migrations/*
    */venv/*
    */tests/*
    */asgi.py
    */wsgi.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
