# Blueprint opcional: solo el servicio Node «rapicredit-frontend» (SPA + proxy /api).
#
# Stack completo (recomendado): en la raíz del repo, render.yaml define pagos-frontend + pagos-backend
# y API_BASE_URL vía fromService (siempre coherente con el backend del mismo blueprint).
#
# Este archivo es útil si el backend ya existe en otro blueprint/servicio: entonces API_BASE_URL debe ser
# la URL pública exacta del FastAPI (en Render: Web Service del API → Environment → RENDER_EXTERNAL_URL),
# nunca la URL del propio frontend (si coinciden, el proxy /api se habla a sí mismo → 502).
#
# Navegador: las peticiones van a /api same-origin; no hace falta VITE_API_URL cruzado al API.
# (Si en el build queda VITE_API_URL a otro origen, env.ts fuerza base '' y /api; igual conviene no definirla.)
services:
  - type: web
    name: rapicredit-frontend
    env: node
    region: oregon
    plan: free
    branch: main
    autoDeploy: true
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run render-start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      # Proxy Express (server.js): destino real del FastAPI. Sustituya por el RENDER_EXTERNAL_URL de su API.
      # Valor de ejemplo; en el panel de Render debe coincidir con el servicio Python que ejecuta Gunicorn.
      - key: API_BASE_URL
        value: https://pagos-f2qf.onrender.com
      - key: NODE_ENV
        value: production
