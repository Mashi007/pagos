services:
  # Frontend (Web Service - mantiene compatibilidad con configuracion anterior)
  - type: web
    name: pagos-frontend
    env: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: node server.js
    # GET / devuelve 302 -> /pagos; Render exige 200 en el health check por defecto -> timeout.
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      # API_BASE_URL: URL del backend para proxy /api/*. Render la inyecta desde pagos-backend.
      - key: API_BASE_URL
        fromService:
          name: pagos-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # Backend
  - type: web
    name: pagos-backend
    env: python
    buildCommand: pip install -r ../requirements.txt
    # Migraciones antes del swap de trafico: el proceso de arranque solo levanta Gunicorn
    # (evita timeout de deploy si alembic + import pesado superan el margen de Render).
    preDeployCommand: alembic upgrade head
    # graceful-timeout: tiempo para que los workers terminen peticiones al recibir SIGTERM
    # (reduce "Error while closing socket [Errno 9] Bad file descriptor" en shutdown)
    # 1 worker: menos RAM y un solo startup BD (workers>1 duplican import ML + on_startup; deploy Render suele timeout ~15m).
    startCommand: gunicorn app.main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 180 --graceful-timeout 45 --worker-class uvicorn.workers.UvicornWorker
    rootDir: backend
    # /health responde sin BD; /health/db puede marcar 503 si Postgres aun no acepta conexiones.
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    # NOTA: Las variables de entorno sensibles (WHATSAPP_ACCESS_TOKEN, etc.)
    # deben configurarse manualmente en Render Dashboard por seguridad

